services:
  postgres:
    image: postgres:16
    container_name: food_waste_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: food_waste
      POSTGRES_USER: food_waste_user
      POSTGRES_PASSWORD: food_waste_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U food_waste_user -d food_waste"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: